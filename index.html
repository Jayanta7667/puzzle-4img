<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concrete Puzzle</title><style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:white;
  text-align:center;
}

/* HOME */
#home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.title{
  font-size:48px;
  color:#d4ff00;
  text-shadow:0 0 20px #d4ff00;
}

.owner{
  margin-top:10px;
  color:#aaa;
}

#startBtn{
  margin-top:30px;
  padding:20px 70px;
  font-size:22px;
  background:#d4ff00;
  border:3px solid black;
  cursor:pointer;
}

/* GAME */
#game{
  display:none;
}

#board{
  display:grid;
  grid-template-columns:repeat(5,90px);
  gap:6px;
  justify-content:center;
  margin-top:20px;
}

.tile{
  width:90px;
  height:90px;
  border:2px solid white;
  background-size:450px 180px;
}

/* SCORE */
#score{
  margin-top:10px;
  color:#d4ff00;
}
</style></head><body><div id="home">
  <div class="title">CONCRETE PUZZLE</div>
  <div class="owner">Owner: Jayanta (JD)</div>
  <button id="startBtn" onclick="startGame()">START</button>
</div><div id="game">
  <h2 id="levelText">Level 1</h2>
  <h3>Time: <span id="time">0</span>s</h3>
  <div id="score">Best: 0s</div>
  <div id="board"></div>
</div><audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
let level=1;
let tiles=[];
let time=0;
let timer;

let images=["img1.jpg","img2.jpg","img3.jpg","img4.jpg"];

function startGame(){
  document.getElementById("home").style.display="none";
  document.getElementById("game").style.display="block";
  loadLevel();
}

function startTimer(){
  clearInterval(timer);
  time=0;
  timer=setInterval(()=>{
    time++;
    document.getElementById("time").innerText=time;
  },1000);
}

function loadLevel(){
  document.getElementById("levelText").innerText="Level "+level;

  tiles=[];
  for(let i=0;i<10;i++) tiles.push(i);
  tiles.sort(()=>Math.random()-0.5);

  startTimer();
  render();
}

function render(){
  let board=document.getElementById("board");
  board.innerHTML="";

  tiles.forEach((val,i)=>{
    let div=document.createElement("div");
    div.className="tile";

    if(val<8){
      let x=(val%5)*90;
      let y=Math.floor(val/5)*90;
      div.style.backgroundImage=`url(${images[level-1]})`;
      div.style.backgroundPosition=`-${x}px -${y}px`;
    }else{
      div.style.background="#000";
    }

    div.onclick=()=>move(i);
    board.appendChild(div);
  });
}

function move(i){
  let empty1=tiles.indexOf(8);
  let empty2=tiles.indexOf(9);

  let valid=[empty1-1,empty1+1,empty1-5,empty1+5,
             empty2-1,empty2+1,empty2-5,empty2+5];

  if(valid.includes(i)){
    document.getElementById("clickSound").play();

    if(Math.abs(i-empty1)<=5){
      [tiles[i],tiles[empty1]]=[tiles[empty1],tiles[i]];
    }else{
      [tiles[i],tiles[empty2]]=[tiles[empty2],tiles[i]];
    }

    render();
    checkWin();
  }
}

function checkWin(){
  if(tiles.slice(0,8).toString()=="0,1,2,3,4,5,6,7"){
    clearInterval(timer);
    document.getElementById("winSound").play();

    // save best score
    let best = localStorage.getItem("best") || 9999;
    if(time < best){
      localStorage.setItem("best", time);
    }

    document.getElementById("score").innerText =
      "Best: " + localStorage.getItem("best") + "s";

    setTimeout(()=>{
      if(level<4){
        level++;
        loadLevel();
      }else{
        alert("🎉 Game Completed!");
        location.reload();
      }
    },300);
  }
}

/* swipe support */
let startX=0;
document.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(endX-startX>50) console.log("swipe right");
});
</script></body>
</html>
