<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concrete Puzzle</title><style>
body{
  margin:0;
  background:#0d0d0d;
  color:white;
  text-align:center;
  font-family:Arial;
}

.title{font-size:40px;color:#d4ff00;}

#home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.btn{
  margin:6px;
  padding:12px 25px;
  background:#d4ff00;
  border:2px solid black;
  cursor:pointer;
}

/* image select */
#imgList img{
  width:70px;
  height:70px;
  margin:5px;
  border:2px solid white;
  cursor:pointer;
}
#imgList img.selected{
  border:3px solid #d4ff00;
}

/* game */
#game{display:none;}

#preview{
  width:200px;
  height:200px;
  margin:auto;
  border:3px solid #d4ff00;
  background-size:cover;
}

#board{
  display:grid;
  gap:4px;
  justify-content:center;
  margin-top:20px;
}

.tile{
  width:90px;
  height:90px;
  border:1px solid #333;
}
</style></head><body><!-- HOME --><div id="home">
  <div class="title">CONCRETE PUZZLE</div>
  <p>Owner: Jayanta (JD)</p>  <!-- image select -->  <div id="imgList">
    <img src="img1.jpg" onclick="selectImage(this)">
    <img src="img2.jpg" onclick="selectImage(this)">
    <img src="img3.jpg" onclick="selectImage(this)">
    <img src="img4.jpg" onclick="selectImage(this)">
  </div>  <br>  <!-- upload --><input type="file" id="imgInput" accept="image/*"><br><br>

  <!-- grid select -->  <div>
    <button class="btn" onclick="setGrid(event,6)">6</button>
    <button class="btn" onclick="setGrid(event,9)">9</button>
    <button class="btn" onclick="setGrid(event,12)">12</button>
    <button class="btn" onclick="setGrid(event,20)">20</button>
  </div>  <br>  <!-- START --><button class="btn" onclick="startGame()">START GAME</button>

</div><!-- GAME --><div id="game">
  <h2 id="lvl"></h2>
  <h3>Time: <span id="time">0</span>s</h3>  <div id="preview"></div>
  <div id="board"></div>  <br>
  <button class="btn" onclick="location.reload()">BACK</button>
</div><script>
// 🔊 SOUND
let ctx=new (window.AudioContext||window.webkitAudioContext)();

function sound(freq=500,time=0.1){
 let o=ctx.createOscillator();
 let g=ctx.createGain();
 o.connect(g); g.connect(ctx.destination);
 o.frequency.value=freq;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+time);
 o.stop(ctx.currentTime+time);
}

document.body.addEventListener("click",()=>{
 if(ctx.state==="suspended") ctx.resume();
},{once:true});

// ===== STATE =====
let total=0;
let imageSrc="img1.jpg";
let tiles=[];
let timer,time=0;

// image select
function selectImage(el){
 document.querySelectorAll("#imgList img").forEach(img=>{
  img.classList.remove("selected");
 });
 el.classList.add("selected");
 imageSrc=el.src;
}

// grid select
function setGrid(e,size){
 total=size;

 document.querySelectorAll(".btn").forEach(btn=>{
   btn.style.border="2px solid black";
 });

 e.target.style.border="3px solid red";
}

// start game
function startGame(){

 let file=document.getElementById("imgInput").files[0];
 if(file){
   imageSrc=URL.createObjectURL(file);
 }

 if(total===0){
   alert("Select grid first!");
   return;
 }

 document.getElementById("home").style.display="none";
 document.getElementById("game").style.display="block";

 document.getElementById("lvl").innerText=total+" BOX MODE";

 document.getElementById("preview").style.backgroundImage=
 `url(${imageSrc})`;

 tiles=[];
 for(let i=0;i<total;i++) tiles.push(i);

 tiles.sort(()=>Math.random()-0.5);

 let cols=Math.ceil(Math.sqrt(total));
 document.getElementById("board").style.gridTemplateColumns=
 `repeat(${cols},90px)`;

 startTimer();
 render();
}

// timer
function startTimer(){
 clearInterval(timer);
 time=0;
 timer=setInterval(()=>{
  time++;
  document.getElementById("time").innerText=time;
 },1000);
}

// render
function render(){
 let board=document.getElementById("board");
 board.innerHTML="";

 let empty=total-1;
 let cols=Math.ceil(Math.sqrt(total));

 tiles.forEach((val,i)=>{
  let div=document.createElement("div");
  div.className="tile";

  if(val!==empty){
    let x=(val%cols)*90;
    let y=Math.floor(val/cols)*90;

    div.style.backgroundImage=`url(${imageSrc})`;
    div.style.backgroundPosition=`-${x}px -${y}px`;
    div.style.backgroundSize=`${cols*90}px ${cols*90}px`;
  }else{
    div.style.background="#000";
  }

  div.onclick=()=>move(i);
  board.appendChild(div);
 });
}

// move
function move(i){
 let empty=tiles.indexOf(total-1);
 let cols=Math.ceil(Math.sqrt(total));

 let valid=[empty-1,empty+1,empty-cols,empty+cols];

 if(valid.includes(i)){
  sound(500,0.1);
  [tiles[i],tiles[empty]]=[tiles[empty],tiles[i]];
  render();
  checkWin();
 }
}

// win
function checkWin(){
 let win=true;
 for(let i=0;i<total;i++){
  if(tiles[i]!==i){ win=false; break; }
 }

 if(win){
  clearInterval(timer);
  sound(900,0.3);

  setTimeout(()=>{
    alert("Completed in "+time+"s");
    location.reload();
  },300);
 }
}
</script></body>
</html>
