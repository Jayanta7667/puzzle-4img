<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concrete Puzzle</title><style>
body{
  margin:0;
  background:#0d0d0d;
  color:white;
  text-align:center;
  font-family:Arial;
}

#home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.title{font-size:45px;color:#d4ff00;}

.btn{
  margin:10px;
  padding:15px 40px;
  font-size:18px;
  background:#d4ff00;
  border:2px solid black;
}

#game{display:none;}

#preview{
  width:200px;
  height:200px;
  margin:auto;
  border:3px solid #d4ff00;
  background-size:cover;
}

#board{
  display:grid;
  gap:4px;
  justify-content:center;
  margin-top:20px;
}

.tile{
  width:90px;
  height:90px;
  border:1px solid #333;
  background-size:300px 300px;
}
</style></head><body><div id="home">
  <div class="title">CONCRETE PUZZLE</div>
  <p>Owner: Jayanta (JD)</p><button class="btn" onclick="startGame(6)">6 BOX</button>
<button class="btn" onclick="startGame(9)">9 BOX</button>
<button class="btn" onclick="startGame(12)">12 BOX</button>
<button class="btn" onclick="startGame(18)">18 BOX</button>

</div><div id="game">
  <h2 id="lvl"></h2>
  <h3>Time: <span id="time">0</span>s</h3>  <div id="preview"></div>
  <div id="board"></div>  <br>
  <button class="btn" onclick="goHome()">BACK</button>
</div><script>
// đź”Š SOUND
let ctx=new (window.AudioContext||window.webkitAudioContext)();

function playSound(freq=500,duration=0.1){
 let o=ctx.createOscillator();
 let g=ctx.createGain();
 o.connect(g); g.connect(ctx.destination);
 o.frequency.value=freq;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
 o.stop(ctx.currentTime+duration);
}

document.body.addEventListener("click",()=>{
 if(ctx.state==="suspended") ctx.resume();
},{once:true});

// ===== GAME =====
let total=6;
let tiles=[];
let timer,time=0;

let images=["img1.jpg","img2.jpg","img3.jpg","img4.jpg"];
let currentImage="img1.jpg";

function startGame(size){
 total=size;

 // random image
 currentImage=images[Math.floor(Math.random()*images.length)];

 document.getElementById("home").style.display="none";
 document.getElementById("game").style.display="block";

 document.getElementById("lvl").innerText=size+" BOX MODE";

 document.getElementById("preview").style.backgroundImage=
 `url(${currentImage})`;

 tiles=[];
 for(let i=0;i<total;i++) tiles.push(i);

 tiles.sort(()=>Math.random()-0.5);

 let cols=Math.ceil(Math.sqrt(total));
 document.getElementById("board").style.gridTemplateColumns=
 `repeat(${cols},90px)`;

 startTimer();
 render();
}

function goHome(){
 location.reload();
}

function startTimer(){
 clearInterval(timer);
 time=0;
 timer=setInterval(()=>{
  time++;
  document.getElementById("time").innerText=time;
 },1000);
}

function render(){
 let board=document.getElementById("board");
 board.innerHTML="";

 let emptyVal = total-1;
 let cols=Math.ceil(Math.sqrt(total));

 tiles.forEach((val,i)=>{
  let div=document.createElement("div");
  div.className="tile";

  if(val !== emptyVal){
    let x=(val % cols)*90;
    let y=Math.floor(val / cols)*90;

    div.style.backgroundImage=`url(${currentImage})`;
    div.style.backgroundPosition=`-${x}px -${y}px`;
  }else{
    div.style.background="#000";
  }

  div.onclick=()=>move(i);
  board.appendChild(div);
 });
}

function move(i){
 let empty=tiles.indexOf(total-1);
 let cols=Math.ceil(Math.sqrt(total));

 let valid=[
   empty-1, empty+1,
   empty-cols, empty+cols
 ];

 if(valid.includes(i)){
  playSound(500,0.1);

  [tiles[i],tiles[empty]]=[tiles[empty],tiles[i]];
  render();
  checkWin();
 }
}

function checkWin(){
 let win=true;
 for(let i=0;i<total;i++){
  if(tiles[i]!==i){
    win=false;
    break;
  }
 }

 if(win){
  clearInterval(timer);
  playSound(900,0.3);

  setTimeout(()=>{
    alert("đźŽ‰ Completed in "+time+"s");
    location.reload();
  },300);
 }
}
</script></body>
</html>
