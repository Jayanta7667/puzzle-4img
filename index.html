<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concrete Puzzle</title><style>
body{
  margin:0;
  font-family:Arial;
  background:#ececec;
  text-align:center;
}

/* HOME SCREEN */
#home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.title{
  font-size:50px;
  font-weight:bold;
  letter-spacing:2px;
}

.sub{
  font-size:14px;
  color:#666;
  margin-bottom:20px;
}

#startBtn{
  padding:22px 70px;
  font-size:22px;
  background:#d4ff00;
  border:3px solid black;
  cursor:pointer;
  box-shadow:6px 6px 0px black;
}

/* GAME */
#game{
  display:none;
}

#board{
  display:grid;
  grid-template-columns:repeat(3,130px);
  gap:6px;
  justify-content:center;
  margin-top:20px;
}

.tile{
  width:130px;
  height:130px;
  border:2px solid black;
  background-size:390px 390px;
}

/* INFO */
h2{
  margin-top:10px;
}
</style></head><body><!-- HOME --><div id="home">
  <div class="title">CONCRETE PUZZLE</div>
  <div class="sub">3x3 Sliding Challenge</div>
  <button id="startBtn" onclick="startGame()">START GAME</button>
</div><!-- GAME --><div id="game">
  <h2 id="levelText">Level 1</h2>
  <h3>Time: <span id="time">0</span>s</h3>
  <div id="board"></div>
</div><script>
let level = 1;
let size = 3;
let tiles = [];
let time = 0;
let timer;

// 4 images use korbe
let images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg"];

function startGame(){
  document.getElementById("home").style.display="none";
  document.getElementById("game").style.display="block";
  loadLevel();
}

function startTimer(){
  clearInterval(timer);
  time = 0;
  document.getElementById("time").innerText = 0;

  timer = setInterval(()=>{
    time++;
    document.getElementById("time").innerText = time;
  },1000);
}

function loadLevel(){
  document.getElementById("levelText").innerText = "Level " + level;

  tiles = [];
  for(let i=0;i<9;i++) tiles.push(i);

  tiles.sort(()=>Math.random()-0.5);

  startTimer();
  render();
}

function render(){
  let board = document.getElementById("board");
  board.innerHTML = "";

  tiles.forEach((val,i)=>{
    let div = document.createElement("div");
    div.className="tile";

    if(val !== 8){
      let x = (val % 3)*130;
      let y = Math.floor(val/3)*130;

      div.style.backgroundImage = `url(${images[level-1]})`;
      div.style.backgroundPosition = `-${x}px -${y}px`;
    } else {
      div.style.background="#fff";
    }

    div.onclick = ()=>move(i);
    board.appendChild(div);
  });
}

function move(i){
  let empty = tiles.indexOf(8);

  let valid = [
    empty-1, empty+1,
    empty-3, empty+3
  ];

  if(valid.includes(i)){
    [tiles[i], tiles[empty]] = [tiles[empty], tiles[i]];
    render();
    checkWin();
  }
}

function checkWin(){
  if(tiles.toString() == "0,1,2,3,4,5,6,7,8"){
    clearInterval(timer);

    setTimeout(()=>{
      if(level < 4){
        alert("Level "+level+" Complete!");
        level++;
        loadLevel();
      } else {
        alert("🎉 Game Completed!");
        location.reload();
      }
    },300);
  }
}
</script></body>
</html>
