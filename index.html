<!DOCTYPE html><html>
<head>
<title>4 Image Puzzle Game</title>
<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#f5f5f5;
}/* HOME SCREEN */
#home{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

button{
padding:15px 30px;
font-size:18px;
background:#d4ff00;
border:2px solid black;
cursor:pointer;
}

/* GAME SCREEN */
#game{
display:none;
}

#board{
display:grid;
grid-template-columns:repeat(2,150px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.tile{
width:150px;
height:150px;
border:2px solid black;
background-size:300px 300px;
}
</style>

</head><body><!-- HOME --><div id="home">
  <h1>🧩 Puzzle Game</h1>
  <button onclick="startGame()">START GAME</button>
</div><!-- GAME --><div id="game">
  <h2 id="levelText">Level 1</h2>
  <h3>Time: <span id="time">0</span>s</h3>
  <div id="board"></div>
</div><script>
let level = 1;
let size = 2;
let tiles = [0,1,2,3];
let time = 0;
let timer;

// 4 images
let images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg"];

function startGame(){
  document.getElementById("home").style.display="none";
  document.getElementById("game").style.display="block";
  loadLevel();
}

function startTimer(){
  clearInterval(timer);
  time = 0;
  document.getElementById("time").innerText = 0;

  timer = setInterval(()=>{
    time++;
    document.getElementById("time").innerText = time;
  },1000);
}

function loadLevel(){
  document.getElementById("levelText").innerText = "Level " + level;

  tiles = [0,1,2,3];
  tiles.sort(()=>Math.random()-0.5);

  startTimer();
  render();
}

function render(){
  let board = document.getElementById("board");
  board.innerHTML = "";

  tiles.forEach((val,i)=>{
    let div = document.createElement("div");
    div.className="tile";

    if(val!==3){
      let x = (val % 2)*150;
      let y = Math.floor(val/2)*150;

      div.style.backgroundImage = `url(${images[level-1]})`;
      div.style.backgroundPosition = `-${x}px -${y}px`;
    } else {
      div.style.background="#fff";
    }

    div.onclick=()=>move(i);
    board.appendChild(div);
  });
}

function move(i){
  let empty = tiles.indexOf(3);

  let valid=[empty-1,empty+1,empty-2,empty+2];

  if(valid.includes(i)){
    [tiles[i],tiles[empty]]=[tiles[empty],tiles[i]];
    render();
    checkWin();
  }
}

function checkWin(){
  if(tiles.toString()=="0,1,2,3"){
    clearInterval(timer);

    setTimeout(()=>{
      if(level<4){
        alert("Level "+level+" Complete!");
        level++;
        loadLevel();
      }else{
        alert("🎉 Game Completed!");
        location.reload();
      }
    },300);
  }
}
</script></body>
</html>
