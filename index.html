<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concrete Puzzle</title><style>
body{
  margin:0;
  background:#0d0d0d;
  color:white;
  text-align:center;
  font-family:Arial;
}

#home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.title{font-size:45px;color:#d4ff00;}

#startBtn{
  padding:20px 70px;
  font-size:22px;
  background:#d4ff00;
  border:3px solid black;
}

#game{display:none;}

#preview{
  width:200px;
  height:200px;
  margin:auto;
  margin-top:10px;
  border:3px solid #d4ff00;
  background-size:cover;
  background-position:center;
}

#board{
  display:grid;
  gap:4px;
  justify-content:center;
  margin-top:20px;
}

.tile{
  width:90px;
  height:90px;
  border:1px solid #333;
  background-size:300px 300px;
}
</style></head><body><div id="home">
  <div class="title">CONCRETE PUZZLE</div>
  <p>Owner: Jayanta (JD)</p>
  <button id="startBtn" onclick="startGame()">START</button>
</div><div id="game">
  <h2 id="lvl"></h2>
  <h3>Time: <span id="time">0</span>s</h3>  <!-- 🔥 IMAGE PREVIEW -->  <div id="preview"></div>  <div id="board"></div>
</div><script>
// 🔊 SOUND
let ctx=new (window.AudioContext||window.webkitAudioContext)();

function playSound(freq=500,duration=0.1){
 let o=ctx.createOscillator();
 let g=ctx.createGain();
 o.connect(g); g.connect(ctx.destination);
 o.frequency.value=freq;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
 o.stop(ctx.currentTime+duration);
}

document.body.addEventListener("click",()=>{
 if(ctx.state==="suspended") ctx.resume();
},{once:true});

// ===== GAME =====
let level=1;
let sizes=[6,9,12,18];
let tiles=[];
let timer,time=0;

let images=["img1.jpg","img2.jpg","img3.jpg","img4.jpg"];

function startGame(){
 document.getElementById("home").style.display="none";
 document.getElementById("game").style.display="block";
 loadLevel();
}

function loadLevel(){
 let total=sizes[level-1];
 document.getElementById("lvl").innerText="Level "+level;

 // 🔥 preview image set
 document.getElementById("preview").style.backgroundImage =
 `url(${images[level-1]})`;

 tiles=[];
 for(let i=0;i<total;i++) tiles.push(i);

 tiles.sort(()=>Math.random()-0.5);

 let cols=Math.ceil(Math.sqrt(total));
 document.getElementById("board").style.gridTemplateColumns=
 `repeat(${cols},90px)`;

 startTimer();
 render();
}

function startTimer(){
 clearInterval(timer);
 time=0;
 timer=setInterval(()=>{
  time++;
  document.getElementById("time").innerText=time;
 },1000);
}

function render(){
 let board=document.getElementById("board");
 board.innerHTML="";

 let total=sizes[level-1];
 let emptyVal = total-1;

 let cols=Math.ceil(Math.sqrt(total));

 tiles.forEach((val,i)=>{
  let div=document.createElement("div");
  div.className="tile";

  if(val !== emptyVal){
    let x=(val % cols)*90;
    let y=Math.floor(val / cols)*90;

    div.style.backgroundImage=`url(${images[level-1]})`;
    div.style.backgroundPosition=`-${x}px -${y}px`;
  }else{
    div.style.background="#000";
  }

  div.onclick=()=>move(i);
  board.appendChild(div);
 });
}

function move(i){
 let total=sizes[level-1];
 let empty=tiles.indexOf(total-1);

 let cols=Math.ceil(Math.sqrt(total));

 let valid=[
   empty-1, empty+1,
   empty-cols, empty+cols
 ];

 if(valid.includes(i)){
  playSound(500,0.1);

  [tiles[i],tiles[empty]]=[tiles[empty],tiles[i]];

  render();
  checkWin();
 }
}

function checkWin(){
 let total=sizes[level-1];

 let win=true;
 for(let i=0;i<total;i++){
  if(tiles[i]!==i){
    win=false;
    break;
  }
 }

 if(win){
  clearInterval(timer);
  playSound(900,0.3);

  setTimeout(()=>{
   if(level<4){
    level++;
    loadLevel();
   }else{
    alert("🎉 Game Completed!");
    location.reload();
   }
  },300);
 }
}
</script></body>
</html>
